<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatore Zaino - Ottimizzatore</title>
    <style>
        /* Impostazioni di base per tutta la pagina */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Il "contenitore" principale stile carta */
        .container {
            background-color: #1e1e1e;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: #00e676; /* Verde fluo */
            font-family: monospace;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Stile per raggruppare label e input */
        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: bold;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333333;
            background-color: #2a2a2a;
            color: #ffffff;
            font-size: 16px;
            font-family: monospace;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #00e676;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.3);
        }

        /* Il bottone di calcolo */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background-color: #00e676;
            color: #121212;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #00c853;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* La scatola del risultato stile terminale */
        #risultato {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            background-color: #000000;
            color: #00ff00;
            font-family: monospace;
            white-space: pre-wrap; /* Mantiene gli a capo del testo */
            border-left: 4px solid #00e676;
            min-height: 60px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>> KNAPSACK_SOLVER</h2>

    <div class="input-group">
        <label>Capacità dello Zaino:</label>
        <input type="number" id="capacita" value="10">
    </div>

    <div class="input-group">
        <label>Valori (separati da virgola):</label>
        <input type="text" id="valori" value="100, 5, 5">
    </div>

    <div class="input-group">
        <label>Pesi (separati da virgola):</label>
        <input type="text" id="pesi" value="50, 4, 4">
    </div>

    <button onclick="calcola()">Esegui Ottimizzazione</button>

    <div id="risultato">In attesa dei parametri...</div>
</div>

<script>
    function calcola(){
        document.getElementById("risultato").innerText = "Calcolo in corso...";

        // Leggiamo i dati da html
        const capacita = parseInt(document.getElementById("capacita").value);
        const valoriStringa = document.getElementById("valori").value;
        const pesiStringa = document.getElementById("pesi").value;

        // Trasformo in array di interi la stringa
        const valori = valoriStringa.split(',').map(n => parseInt(n.trim()));
        const pesi = pesiStringa.split(',').map(n => parseInt(n.trim()));

        // Il pacco JSON da inviare a JAVA
        const datiDaInviare = {
            capacita: capacita,
            valori: valori,
            pesi: pesi
        };

        // Spedisco i dati con fetch (uguale a curl)
        fetch("http://localhost:8080/api/ottimizza", {
            method: "POST",
            headers: {"Content-Type" : "application/json"},
            body: JSON.stringify(datiDaInviare)
        })
            .then(response => response.text())
            .then(testoRicevuto => {
                // Stampo la risposta da C
                document.getElementById("risultato").innerText = testoRicevuto;
            })
            .catch(errore => {
                document.getElementById("risultato").innerText = "Errore di connessione al server...\nAssicurati che Spring Boot sia avviato!";
            })
    }
</script>
</body>
</html>
